<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Стирка WebApp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f4f4;
      color: #222;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 12px;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .title {
      font-size: 20px;
      font-weight: 600;
      margin: 8px 0 12px;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

.tile {
  background: none;
  padding: 0;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
}


    .tile img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
    }

    .tile.single-row {
      grid-column: 1 / 3; /* одна плитка на всю ширину */
    }

    .back-btn {
      margin-top: 12px;
      padding: 10px 16px;
      width: 100%;
      border-radius: 10px;
      border: none;
      background: #2f80ed;
      color: #fff;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
    }

    .back-btn:active {
      background: #1c5ec0;
    }

    .result-text {
      margin-top: 12px;
      font-size: 15px;
      line-height: 1.4;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 8px;
    }

    .product-card {
      background:  none;
      border-radius: 10px;
      padding: 0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

	.product-card img {
  width: 100%;
  height: 120px;          /* фиксированная высота для всех картинок */
  object-fit: contain;    /* картинка сохраняет пропорции */
  display: block;
}


    .product-label {
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Экран 1: меню категорий -->
    <div id="screen-menu" class="screen active">
  <div class="title">Выберите категорию</div>

  <div class="grid">

    <!-- 1. Цветное -->
    <div class="tile" onclick="openCategory('color')">
      <img src="images/colour.png" alt="Цветное">
    </div>

    <!-- 2. Белое -->
    <div class="tile" onclick="openCategory('white')">
      <img src="images/whites.png" alt="Белое">
    </div>

    <!-- 3. Домашнее -->
    <div class="tile" onclick="openCategory('home')">
      <img src="images/home.png" alt="Домашнее">
    </div>

    <!-- 4. Тёмная одежда -->
    <div class="tile" onclick="openCategory('dark')">
      <img src="images/dark.png" alt="Тёмная одежда">
    </div>

    <!-- 5. Постельное бельё -->
    <div class="tile" onclick="openCategory('bedding')">
      <img src="images/postel.png" alt="Постельное бельё">
    </div>

    <!-- 6. Полотенца -->
    <div class="tile" onclick="openCategory('towels')">
      <img src="images/towels.png" alt="Полотенца">
    </div>

    <!-- 7. Покрывало -->
    <div class="tile" onclick="openCategory('cover')">
      <img src="images/coverblack.png" alt="Покрывало">
    </div>

    <!-- 8. Плед -->
    <div class="tile" onclick="openCategory('blanket')">
      <img src="images/cover.png" alt="Плед">
    </div>

    <!-- 9. Спорт -->
    <div class="tile" onclick="openCategory('sport')">
      <img src="images/sport.png" alt="Спорт">
    </div>

    <!-- 10. Шерсть -->
    <div class="tile" onclick="openCategory('wool')">
      <img src="images/wool.png" alt="Шерсть">
    </div>

  </div>
</div>


    <!-- Экран 2: результат -->
    <div id="screen-result" class="screen">
  <button class="back-btn" onclick="goBack()">← Назад</button>
  <div id="result-title" class="title"></div>
  <div id="result-text" class="result-text"></div>
  <div id="products-grid" class="grid"></div>
</div>


 <script>
const categories = {

  color: {
    title: "Цветное",
    products: [
      { img: "images/colour_detergent.png", label: "Гель для цветного" },
{ img: "images/water_tablet.png", label: "Смягчитель воды" }
    ],
    text: "Температура: 20°C<br>Программа: Barevne"
  },

  white: {
    title: "Белое",
    products: [
      { img: "images/white_detergent.png", label: "Гель для белого" },
      { img: "images/bleach.png", label: "Отбеливатель(60мл)" },
      { img: "images/water_tablet.png", label: "Смягчитель воды" }
    ],
    text: "Температура: 40°C<br>Обороты: 800<br>Программа: Bavlna"
  },

  home: {
    title: "Домашнее",
    products: [
      { img: "images/colour_detergent_climate.png", label: "Гель для цветного" },
      { img: "images/softener.png", label: "Убийца бактерий" },
      { img: "images/water_tablet.png", label: "Смягчитель воды" }
    ],
    text: "Температура: 30°C<br>Обороты: 1000<br>Программа: Bavlna"
  },

  dark: {
    title: "Тёмная одежда",
    products: [
      { img: "images/dark_detergent.png", label: "Средство для тёмного" },
      { img: "images/water_tablet.png", label: "Смягчитель воды" }
    ],
    text: "Температура: 20°C<br>Обороты: 600<br>Программа: Barevne"
  },

  bedding: {
    title: "Постельное бельё",
    products: [
      { img: "images/white_detergent.png", label: "Гель для белого" },
      { img: "images/bleach.png", label: "Отбеливатель(60мл)" },
      { img: "images/water_tablet.png", label: "Смягчитель воды" }
    ],
    text: "Температура: 60°C<br>Обороты: 1000<br>Программа: Bavlna"
  },

  towels: {
    title: "Полотенца",
    products: [
      { img: "images/colour_detergent_climate.png", label: "Гель для цветного" },
      { img: "images/softener.png", label: "Убийца бактерий" },
      { img: "images/water_tablet.png", label: "Смягчитель воды" }
    ],
    text: "Температура: 60°C<br>Обороты: 1000<br>Программа: Bavlna"
  },

  cover: {
    title: "Покрывало",
    products: [
      { img: "images/dark_detergent.png", label: "Гель для черного" },
      { img: "images/water_tablet.png", label: "Смягчитель воды" }
    ],
    text: "Температура: 20°C<br>Программа: Pokryvky"
  },

  blanket: {
    title: "Плед",
    products: [
      { img: "images/synthetics_detergent.png", label: "Гель для синтетики" }
    ],
    text: "Температура: 30°C<br>Обороты: 1000<br>Программа: Syntetika"
  },

  sport: {
    title: "Спорт",
    products: [
      { img: "images/synthetics_detergent.png", label: "Гель для синтетики" }
    ],
    text: "Программа: Sport"
  },

  wool: {
    title: "Шерсть / Шёлк / Вязка",
    products: [
      { img: "images/wool_detergent.png", label: "Гель для шерсти" }
    ],
    text: "Температура: 20–30°C<br>Обороты: 400<br>Программа: Wool (Načíst program)"
  }
};


function openCategory(key) {
  const cat = categories[key];
  if (!cat) return;

  document.getElementById("screen-menu").classList.remove("active");
  document.getElementById("screen-result").classList.add("active");

  document.getElementById("result-title").textContent = cat.title;

  const textBlock = document.getElementById("result-text");
  if (cat.text && cat.text.trim() !== "") {
    textBlock.innerHTML = cat.text;
    textBlock.style.display = "block";
  } else {
    textBlock.style.display = "none";
  }

  const grid = document.getElementById("products-grid");
  grid.innerHTML = "";
  cat.products.forEach(p => {
    const div = document.createElement("div");
    div.className = "product-card";
    const img = document.createElement("img");
    img.src = p.img;
    img.alt = p.label;
    const label = document.createElement("div");
    label.className = "product-label";
    label.textContent = p.label;
    div.appendChild(img);
    div.appendChild(label);
    grid.appendChild(div);
  });
}

function goBack() {
  document.getElementById("screen-result").classList.remove("active");
  document.getElementById("screen-menu").classList.add("active");
}
</script>


</body>
</html>
